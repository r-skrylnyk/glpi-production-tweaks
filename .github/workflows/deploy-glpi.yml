name: Deploy GLPI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'k8s/glpi-*.yaml'
      - '.github/workflows/deploy-glpi.yml'

env:
  K8S_NAMESPACE: glpi

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: "https://glpi.YOUR_DOMAIN"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4.0.1

      - name: Set K8s context
        uses: azure/k8s-set-context@v4.0.1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.K8S_KUBECONFIG }}

      - name: Create namespace if not exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Setup secrets
        env:
          GLPI_API_TOKEN: ${{ secrets.GLPI_API_TOKEN }}
          GLPI_CRYPT_KEY: ${{ secrets.GLPI_CRYPT_KEY }}
          GLPI_DB_USER: ${{ secrets.GLPI_DB_USER }}
        run: |
          kubectl create secret docker-registry dockerhub-secret \
            --docker-server=docker.io \
            --docker-username=${{ secrets.DOCKERHUB_USERNAME }} \
            --docker-password=${{ secrets.DOCKERHUB_TOKEN }} \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # GLPI_API_TOKEN  — Bearer token для custom_api.php (openssl rand -hex 32)
          # GLPI_CRYPT_KEY  — вміст glpicrypt.key з продакшн-сервера (optional)
          # GLPI_DB_USER    — DB username (e.g. glpi_user)
          kubectl create secret generic glpi-secret \
            --from-literal=api-token="${GLPI_API_TOKEN}" \
            --from-literal=crypt-key="${GLPI_CRYPT_KEY}" \
            --from-literal=db-user="${GLPI_DB_USER}" \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        uses: azure/k8s-deploy@v5.0.1
        with:
          action: deploy
          strategy: basic
          namespace: ${{ env.K8S_NAMESPACE }}
          manifests: |
            k8s/glpi-pvc.yaml
            k8s/glpi-configmap.yaml
            k8s/glpi-deployment.yaml
            k8s/glpi-service.yaml
            k8s/glpi-ingress-middleware.yaml
            k8s/glpi-ingress.yaml

      - name: Check pod status
        if: always()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          echo ""
          echo "=== Recent GLPI pod logs ==="
          kubectl logs -n ${{ env.K8S_NAMESPACE }} -l app=glpi --tail=30 || true
