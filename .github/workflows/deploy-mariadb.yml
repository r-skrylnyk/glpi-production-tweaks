name: Deploy GLPI — MariaDB

on:
  workflow_dispatch:   ***REMOVED*** Ручний запуск з GitHub UI
  push:
    branches: [main]
    paths:             ***REMOVED*** Авто-деплой тільки при змінах в цих файлах
      - 'k8s/namespace.yaml'
      - 'k8s/mariadb-*.yaml'
      - '.github/workflows/deploy-mariadb.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connection
        run: kubectl cluster-info --request-timeout=10s

      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create MariaDB credentials secret
        ***REMOVED*** Secrets передаються через env: щоб уникнути проблем зі спецсимволами
        ***REMOVED*** в паролях (base64 може містити +, /, =) при прямій підстановці в shell.
        ***REMOVED*** Паттерн --dry-run=client -o yaml | kubectl apply -f - ідемпотентний:
        ***REMOVED*** створює secret якщо немає, оновлює якщо є (без помилки "already exists")
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          MARIADB_GLPI_PASSWORD: ${{ secrets.MARIADB_GLPI_PASSWORD }}
        run: |
          kubectl create secret generic mariadb-secret \
            --from-literal=root-password="${MARIADB_ROOT_PASSWORD}" \
            --from-literal=glpi-password="${MARIADB_GLPI_PASSWORD}" \
            --namespace=glpi \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply PVC
        run: kubectl apply -f k8s/mariadb-pvc.yaml

      - name: Deploy MariaDB
        run: |
          kubectl apply -f k8s/mariadb-deployment.yaml
          kubectl apply -f k8s/mariadb-service.yaml

      - name: Wait for MariaDB to be ready
        run: kubectl rollout status deployment/mariadb -n glpi --timeout=5m

      - name: Add deploy summary
        run: |
          echo "***REMOVED******REMOVED*** MariaDB Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`glpi\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`mariadb:11.4\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Database | \`glpi\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DB User | \`glpi\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Internal host | \`mariadb.glpi.svc.cluster.local:3306\` |" >> $GITHUB_STEP_SUMMARY
          echo "| PVC | \`mariadb-data\` (5Gi, local-path) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "***REMOVED******REMOVED******REMOVED*** Restore DB (quick):" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "kubectl cp ./backup.sql glpi/\$(kubectl get pod -n glpi -l app=mariadb -o jsonpath='{.items[0].metadata.name}'):/tmp/backup.sql" >> $GITHUB_STEP_SUMMARY
          echo "kubectl exec -n glpi deploy/mariadb -- sh -c 'mysql -u root -p\"\${MYSQL_ROOT_PASSWORD}\" glpi < /tmp/backup.sql'" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
