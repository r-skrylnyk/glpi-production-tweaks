apiVersion: apps/v1
kind: Deployment
metadata:
  name: glpi
  namespace: glpi
  labels:
    app: glpi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glpi
  strategy:
    type: Recreate   ***REMOVED*** GLPI не підтримує кілька інстансів одночасно — блокування БД
  template:
    metadata:
      labels:
        app: glpi
    spec:
      ***REMOVED*** Автоматично виставляє права www-data (uid 33) на PVC при першому монтуванні
      securityContext:
        fsGroup: 33
      containers:
        - name: glpi
          ***REMOVED*** Офіційний образ — містить правильний Apache, всі PHP extensions, auto-генерацію config_db.php
          ***REMOVED*** Custom image can be used instead when core-mods/plugins need to be baked in
          image: glpi/glpi:11.0.8
          imagePullPolicy: Always
          env:
            - name: TIMEZONE
              value: "Europe/Kyiv"
            - name: PHP_INI_memory_limit
              value: "512M"
            - name: GLPI_DB_HOST
              value: mariadb
            - name: GLPI_DB_PORT
              value: "3306"
            - name: GLPI_DB_NAME
              value: your_glpi_database
            - name: GLPI_DB_USER
              value: your_your_glpi_user
            - name: GLPI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: glpi-user-password
          ports:
            - containerPort: 80
          volumeMounts:
            ***REMOVED*** Єдиний PVC для всіх даних GLPI (config, files, logs, plugins, glpicrypt.key)
            - name: glpi-data
              mountPath: /var/glpi
            ***REMOVED*** local_define.php — HTTPS secure cookies за nginx reverse proxy
            - name: glpi-config
              mountPath: /var/www/glpi/config/local_define.php
              subPath: local_define.php
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: glpi-data
          persistentVolumeClaim:
            claimName: glpi-data
        - name: glpi-config
          configMap:
            name: glpi-config
