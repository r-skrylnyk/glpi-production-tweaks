---
# PVC for official GLPI image — stores config, files, logs, plugins, crypto key.
# Official image uses /var/glpi as its data directory.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glpi-data
  namespace: glpi
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
# Legacy PVCs kept for reference (used by custom image builds)
