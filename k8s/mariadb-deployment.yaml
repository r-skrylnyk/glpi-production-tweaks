apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: glpi
  labels:
    app: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  strategy:
    type: Recreate   # Обов'язково для PVC — не може бути 2 pods на одному томі
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: glpidb
            - name: MYSQL_USER
              value: glpi_user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: glpi-user-password
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              # healthcheck.sh вбудований в офіційний mariadb образ — найнадійніший варіант
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 90   # Перша ініціалізація data directory займає 60-90 сек
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: mariadb-data
